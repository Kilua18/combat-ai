<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combat.AI - POC by Norman</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #0f0;
            overflow: hidden;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        #canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.85);
            padding: 20px;
            border: 2px solid #0f0;
            border-radius: 10px;
            font-size: 16px;
            line-height: 1.8;
            text-shadow: 0 0 10px #0f0;
            z-index: 10;
            min-width: 250px;
        }
        .metric {
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
        }
        .metric-label {
            color: #0f0;
            font-weight: bold;
        }
        .metric-value {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
        }
        #punch-alert {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 96px;
            font-weight: bold;
            color: #ff0;
            text-shadow: 0 0 30px #f00, 0 0 60px #f00;
            display: none;
            animation: pulse 0.4s ease-in-out;
            z-index: 20;
        }
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.8; }
        }
        #branding {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 15px #0f0;
            z-index: 10;
        }
        .good { color: #0f0 !important; }
        .medium { color: #ff0 !important; }
        .bad { color: #f00 !important; }
    </style>
</head>
<body>
    <div id="container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        
        <div id="hud">
            <div class="metric">
                <span class="metric-label">STATUS:</span>
                <span class="metric-value" id="status">INITIALIZING...</span>
            </div>
            <div class="metric">
                <span class="metric-label">TECHNIQUE:</span>
                <span class="metric-value" id="punch-type">---</span>
            </div>
            <div class="metric">
                <span class="metric-label">VITESSE:</span>
                <span class="metric-value" id="speed">0.0 m/s</span>
            </div>
            <div class="metric">
                <span class="metric-label">EXTENSION:</span>
                <span class="metric-value" id="extension">0%</span>
            </div>
            <div class="metric">
                <span class="metric-label">SCORE:</span>
                <span class="metric-value" id="score">0/100</span>
            </div>
            <div class="metric">
                <span class="metric-label">COUPS:</span>
                <span class="metric-value" id="total">0</span>
            </div>
        </div>

        <div id="punch-alert">💥 IMPACT!</div>
        
        <div id="branding">COMBAT.AI</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        const statusEl = document.getElementById('status');
        const punchTypeEl = document.getElementById('punch-type');
        const speedEl = document.getElementById('speed');
        const extensionEl = document.getElementById('extension');
        const scoreEl = document.getElementById('score');
        const totalEl = document.getElementById('total');
        const punchAlert = document.getElementById('punch-alert');

        let prevRightWrist = null;
        let prevLeftWrist = null;
        let punchCount = 0;
        let lastPunchTime = 0;
        const PUNCH_COOLDOWN = 600;

        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            enableSegmentation: false,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults(onResults);

        function onResults(results) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (results.poseLandmarks) {
                statusEl.textContent = '🟢 ACTIVE';
                statusEl.className = 'metric-value good';
                
                drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS,
                    {color: '#00FF00', lineWidth: 5});
                drawLandmarks(ctx, results.poseLandmarks,
                    {color: '#FF0000', lineWidth: 3, radius: 8});

                analyzePunch(results.poseLandmarks);
            } else {
                statusEl.textContent = '🔴 NO POSE';
                statusEl.className = 'metric-value bad';
            }

            ctx.restore();
        }

        function analyzePunch(landmarks) {
            const now = Date.now();
            
            const rightShoulder = landmarks[12];
            const rightElbow = landmarks[14];
            const rightWrist = landmarks[16];
            const leftShoulder = landmarks[11];
            const leftElbow = landmarks[13];
            const leftWrist = landmarks[15];

            const rightExtension = Math.abs(rightWrist.x - rightShoulder.x);
            const leftExtension = Math.abs(leftWrist.x - leftShoulder.x);

            let rightSpeed = 0;
            let leftSpeed = 0;

            if (prevRightWrist) {
                const dx = (rightWrist.x - prevRightWrist.x) * canvas.width;
                const dy = (rightWrist.y - prevRightWrist.y) * canvas.height;
                rightSpeed = Math.sqrt(dx*dx + dy*dy) * 30 / 100;
            }

            if (prevLeftWrist) {
                const dx = (leftWrist.x - prevLeftWrist.x) * canvas.width;
                const dy = (leftWrist.y - prevLeftWrist.y) * canvas.height;
                leftSpeed = Math.sqrt(dx*dx + dy*dy) * 30 / 100;
            }

            prevRightWrist = {x: rightWrist.x, y: rightWrist.y, z: rightWrist.z};
            prevLeftWrist = {x: leftWrist.x, y: leftWrist.y, z: leftWrist.z};

            if (now - lastPunchTime > PUNCH_COOLDOWN) {
                if (rightExtension > 0.28 && rightSpeed > 2.5) {
                    detectPunch('CROSS DROIT', rightExtension, rightSpeed);
                    lastPunchTime = now;
                } else if (leftExtension > 0.28 && leftSpeed > 2.5) {
                    detectPunch('JAB GAUCHE', leftExtension, leftSpeed);
                    lastPunchTime = now;
                }
            }

            const maxExtension = Math.max(rightExtension, leftExtension);
            const maxSpeed = Math.max(rightSpeed, leftSpeed);
            
            extensionEl.textContent = `${(maxExtension * 100).toFixed(0)}%`;
            speedEl.textContent = `${maxSpeed.toFixed(1)} m/s`;

            if (maxSpeed < 1) {
                speedEl.className = 'metric-value bad';
            } else if (maxSpeed < 3) {
                speedEl.className = 'metric-value medium';
            } else {
                speedEl.className = 'metric-value good';
            }
        }

        function detectPunch(type, extension, speed) {
            punchCount++;
            
            const extensionScore = Math.min(extension * 150, 100);
            const speedScore = Math.min(speed * 15, 100);
            const score = Math.round((extensionScore * 0.6 + speedScore * 0.4));

            punchTypeEl.textContent = type;
            scoreEl.textContent = `${score}/100`;
            totalEl.textContent = punchCount;

            if (score >= 75) {
                scoreEl.className = 'metric-value good';
                punchAlert.textContent = '💥 EXCELLENT!';
            } else if (score >= 50) {
                scoreEl.className = 'metric-value medium';
                punchAlert.textContent = '💥 BON COUP!';
            } else {
                scoreEl.className = 'metric-value bad';
                punchAlert.textContent = '💥 AMÉLIORE!';
            }

            punchAlert.style.display = 'block';
            setTimeout(() => {
                punchAlert.style.display = 'none';
            }, 400);

            console.log(`Punch #${punchCount} - ${type} - Score: ${score} - Speed: ${speed.toFixed(1)} m/s`);
        }

        const camera = new Camera(video, {
            onFrame: async () => {
                await pose.send({image: video});
            },
            width: 1280,
            height: 720
        });

        camera.start().then(() => {
            console.log('Combat.AI initialized successfully');
        });
    </script>
</body>
</html>
